# pointcloud_to_laserscan — flatten the Unitree L1's RAW 3D cloud (/utlidar/cloud)
# into a 2D LaserScan for the reactive wander. Params apply to the node named
# `pointcloud_to_laserscan` in pipeline.launch.py (cloud_in -> /utlidar/cloud,
# scan -> /scan).
#
# GROUND REMOVAL = THE HEIGHT BAND. The L1 looks down-forward, so most returns are
# the FLOOR. We drop them by transforming the cloud into base_link and keeping only
# points whose height (base_link Z) is in [min_height, max_height]: min_height is
# the FLOOR CUT, max_height drops the ceiling. Anything outside the band is ignored,
# so the floor never becomes a fake obstacle.
#
# Tuning (watch /scan against the live cloud in Foxglove):
#   - floor still showing up as obstacles -> RAISE min_height (0.15 -> 0.25 -> ...)
#   - real low obstacles getting cut      -> lower min_height a touch
#   - band looks tilted / one side floors  -> the slice axis is wrong: set the L1's
#       downward mount tilt via lidar_pitch in pipeline.launch.py so base_link Z is
#       truly vertical (the raw cloud is NOT gravity-aligned, unlike cloud_deskewed).
pointcloud_to_laserscan:
  ros__parameters:
    target_frame: base_link        # transform into base_link, slice/filter in its Z
    transform_tolerance: 0.10       # raw cloud is robot-clock stamped — a bit of slack
    min_height: 0.15               # FLOOR CUT (m above base_link) — raise to kill ground
    max_height: 1.50               # drop ceiling / high returns
    angle_min: -3.14159            # full circle; the L1's real FOV is narrower,
    angle_max: 3.14159             # empty sectors just read as max range
    angle_increment: 0.0087        # ~0.5 deg
    scan_time: 0.10
    range_min: 0.20
    range_max: 30.0                # L1 effective range; dense return is much closer
    use_inf: true
    inf_epsilon: 1.0
    concurrency_level: 1
